name: AlphaScan Watcher

on:
  schedule:
    - cron: "*/10 13-20 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: AlphaScan-Watcher ausführen
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python alphascan_watcher.py

      - name: Dashboard-Daten committen
        run: |
          git config user.name "AlphaScan Bot"
          git config user.email "actions@users.noreply.github.com"
          git add results.json history.json
          git diff --staged --quiet || git commit -m "Update scan results [skip ci]"
          git push
